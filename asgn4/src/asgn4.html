        <div>
            <p id="numdot">NN</p>
            <p>Player Mode: <span id="playerMode">NNNN</span></p>
            <button id="toggleTextures" style="margin-top: 10px;">Toggle Textures</button>
            <button id="toggleLighting" style="margin-top: 10px;">Toggle Lighting</button>
            <button id="toggleLightPath" style="margin-top: 10px;">Light Moves</button>
            <button id="toggleNormals" style="margin-top: 10px;">Toggle Normals</button>
        </div>

    <div id="container">
      <canvas id="webgl">
        Please use a browser that supports "canvas"
      </canvas>

      <div id="crosshair"></div>

      <button id="settingsToggleBtn">Settings</button>
      
      <div id="settingsPanel" class="hidden">
        <span class="close-btn" id="closeSettings">X</span>
        <h3>Settings</h3>

        <div id="settingRow">
          <label for="camMovSpeed">Camera Movement Speed:</label>
          <input id="camMovSpeed" type="number" min="1" value="2" step="1">
        </div>

        <div id="settingRow">
          <label for="camRotSpeed">Camera Sensitivity:</label>
          <input id="camRotSpeed" min="1" max="100" type="number" value="50">
        </div>

        <div id="settingRow" style="margin-top: 10px;">
          <label for="targetSize">Target Size:</label>
          <input id="targetSize" type="number" min="0.05" max="0.5" value="0.1" step="0.01">
        </div>

        <div id="settingRow" style="margin-top: 10px;">
          <label for="maxTargets">Number of Targets:</label>
          <input id="maxTargets" type="number" min="1" value="15" step="1">
        </div>

        <h4 class="settingsText">Settings for randomly generated map:</h4>

        <div id="settingRow" style="margin-top: 10px;">
          <label for="changeMapSize">Change size of map:</label>
          <input id="changeMapSize" type="number" value="64" step="1">
        </div>

        <div id="settingRow" style="margin-top: 10px;">
          <label for="floorTileCount">Number of steps digger takes:</label>
          <input id="floorTileCount" type="number" value="2048" step="1">
          <p style="margin: 0%">(See descriptin for more information on this setting)</p>
        </div>

        <div id="settingRow" style="margin-top: 10px;">
          <label for="volumeSlider">Volume <span class="slider-value" id="volumeValue" style="margin-right: 10px;">100</span>:</label>
          <input id="volumeSlider" type="range" min="0" max="1" value="1" step="0.01">
        </div>

        <h4 class="settingsText">Settings for light:</h4>

        <div id="settingRow" style="margin-top: 10px;">
          <label for="lightX">x positon:</label>
          <input id="lightX" type="range" min="-4" max="4" value="-0.1" step="0.01">
        </div>
        <div id="settingRow" style="margin-top: 10px;">
          <label for="lightY">y positon:</label>
          <input id="lightY" type="range" min="1" max="10" value="2.5" step="0.01">
        </div>
        <div id="settingRow" style="margin-top: 10px;">
          <label for="lightZ">z positon:</label>
          <input id="lightZ" type="range" min="-8" max="4" value="-5.0" step="0.01">
        </div>

        <div id="settingsRow" style="margin-top: 20px;">
          <button id="makeHitBoxVisible">Toggle Hit Box</button>
        </div>

        <div id="settingsRow" style="margin-top: 10px;">
          <button id="resetHeightButton">Reset Height</button>
        </div>
      </div>

      <div id="scorePanel">
        <p style="text-align: center;">Score: <span id="playerScore">0</span></p>
      </div>
    </div>
