<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="icon" href="data:,">
        <meta charset="utf-8" name="color-scheme" content="light dark"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Assignment 5: Three JS Aim Trainer</title>
        <link rel="stylesheet" href="./assets/asgn5.css">

        <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"
            }
        }
        </script>
    </head>

    <body>
        <canvas id="c"></canvas>
        
        <!-- Crosshair positioned dead center -->
        <div id="crosshair"></div>
        
        <div id="hud">
            <div class="hud-item">Score: <span id="score-val">0</span></div>
            <div class="hud-item">Accuracy: <span id="accuracy-val">100</span>%</div>
            <div class="hud-item">Mode: <span id="mode-val" style="color: #ffaa44;">SHOOTING</span></div>
            <div class="hud-item stats-item"><span id="fps-val">0</span> FPS (<span id="ms-val">0</span> ms)</div>
        </div>

        <!-- Pause / Settings Overlay -->
        <div id="settings-menu" class="hidden">
            <div class="menu-content">
                <h2>GAME PAUSED</h2>
                <p class="instruction">Click outside or press Resume to play</p>
                
                <!-- Tab Navigation -->
                <div class="tabs">
                    <button class="tab-btn active" data-target="tab-settings">Settings</button>
                    <button class="tab-btn" data-target="tab-maps">Maps</button>
                </div>

                <!-- Settings Tab -->
                <div id="tab-settings" class="tab-pane active">
                    <fieldset>
                        <legend>Camera & Controls</legend>
                        <div class="setting-row">
                            <label>Horizontal sensitivity:</label>
                            <input type="range" id="slider-sens-x" min="0.01" max="1.0" step="0.01" value="0.50">
                            <span id="sens-x-val">0.50</span>
                        </div>
                        <div class="setting-row">
                            <label>Vertical sensitivity:</label>
                            <input type="range" id="slider-sens-y" min="0.01" max="1.0" step="0.01" value="0.50">
                            <span id="sens-y-val">0.50</span>
                        </div>
                        <div class="setting-row">
                            <label>ADS Sens (Multiplier):</label>
                            <input type="range" id="slider-ads-sens" min="0.1" max="2.0" step="0.01" value="1.00">
                            <span id="ads-sens-val">1.00</span>
                        </div>
                        <div class="setting-row">
                            <label>Field of View (FOV):</label>
                            <input type="range" id="slider-fov" min="60" max="120" step="1" value="90">
                            <span id="fov-val">90</span>
                        </div>
                        <div class="setting-row">
                            <label>Toggle Crouch:</label>
                            <input type="checkbox" id="toggle-crouch">
                        </div>
                        <div class="setting-row">
                            <label>Toggle Sprint:</label>
                            <input type="checkbox" id="toggle-sprint">
                        </div>
                        <div class="setting-row">
                            <label>Flight Mode (V):</label>
                            <input type="checkbox" id="toggle-noclip">
                        </div>
                    </fieldset>

                    <fieldset>
                        <legend>Target Settings</legend>
                        <div class="setting-row">
                            <label>Target Speed:</label>
                            <input type="range" id="slider-speed" min="1" max="10" step="0.5" value="1.5">
                            <span id="speed-val">1.5</span>
                        </div>
                        <div class="setting-row">
                            <label>Target Size:</label>
                            <input type="range" id="slider-size" min="0.2" max="1.5" step="0.1" value="0.5">
                            <span id="size-val">0.5</span>
                        </div>
                        <div class="setting-row">
                            <label>Target Count:</label>
                            <input type="range" id="slider-count" min="1" max="100" step="1" value="20">
                            <span id="count-val">20</span>
                        </div>
                    </fieldset>

                    <fieldset>
                        <legend>Destruction settings</legend>
                        <div class="setting-row">
                            <label for="slider-radius">Blast Radius:</label>
                            <input type="range" id="slider-radius" min="1.0" max="5.0" step="0.5" value="2.0">
                            <span id="radius-val">2.00</span>
                        </div>
                    </fieldset>
                    
                    <fieldset>
                        <legend>Debug settings</legend>
                        <div class="setting-row">
                            <label>Show Spawn Zones:</label>
                            <input type="checkbox" id="toggle-debug-zones">
                        </div>
                        <div class="setting-row">
                            <label>Show Voxel Chunks:</label>
                            <input type="checkbox" id="toggle-debug-chunks">
                        </div>
                    </fieldset>

                    <fieldset>
                        <legend>Game</legend>
                        <button id="btn-reset" class="menu-btn danger">RESET GAME</button>
                    </fieldset>
                </div>

                <!-- Maps Tab -->
                <div id="tab-maps" class="tab-pane">
                    <fieldset>
                        <legend>Scenario Selection</legend>
                        <div class="setting-row">
                            <label>Map Type:</label>
                            <select id="select-map">
                                <option value="moving">Moving Targets</option>
                                <option value="static">Static Targets</option>
                            </select>
                        </div>
                    </fieldset>
                </div>

                <button id="btn-resume" class="menu-btn">RESUME</button>
            </div>
        </div>

        <div id="loading">
            <div class="loading-content">
                <h1>LOADING ASSETS</h1>
                <div class="progress">
                    <div class="progressbar"></div>
                </div>
            </div>
        </div>

        <script type="module" src="asgn5.js"></script>
    </body>
</html>
