<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" name="color-scheme" content="light dark"/>
    <!-- <meta charset="utf-8" /> -->
    <title>Change a point color</title>
  </head>

  <body onload="main()">
    <canvas id="webgl" width="400" height="400">
    Please use a browser that supports "canvas"
    </canvas>

    <p>
      <button type="button" id="clearButton">Clear Canvas</button>
    </p>

    <p>Drawing Mode:</p>

    <p>
      <button type="button" id="squareButton">Squares</button>
      <button type="button" id="triangleButton">Triangles</button>
      <button type="button" id="circleButton">Circles</button>
    </p>

    <p>Shape Color:</p>
    <p>
      Red <input type="range" min="0" max="100" value="100" class="slider" id="redSlider">
      Green <input type="range" min="0" max="100" value="0" class="slider" id="greenSlider">
      Blue <input type="range" min="0" max="100" value="0" class="slider" id="blueSlider">
    </p>

    <p>
      Shape Size: <input type="range" min="5" max="40" value="10" class="slider" id="sizeSlider">
      (Circles) Segment Count: <input type="range" min="3" max="100" value="10" class="slider" id="segmentSlider">
    </p>
    
    <script src="../lib/cuon-matrix-cse160.js"></script>
    <script src="../lib/cuon-utils.js"></script>
    <script src="../lib/webgl-utils.js"></script>
    <script src="../lib/webgl-debug.js"></script>
    <script src="Triangle.js"></script>
    <script src="asgn1.js"></script>
  </body>
</html>
