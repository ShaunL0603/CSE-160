<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- <meta charset="utf-8" name="color-scheme" content="light dark"/> -->
    <meta charset="utf-8" />
    <title>Assignment 2: Blocky 3D Animal</title>
  </head>

  <body onload="main()">
    <h1>Rabid Animal</h1>
    <div>
      <canvas id="webgl" width="800" height="800">
        Please use a browser that supports "canvas"
      </canvas>
    </div>
    <p id="numdot">NN</p>

    <p>Rotation speed: <input id="rotateSensitivity" type="range" min="0.1" max="1" value="0.2" step="0.1"></p>
    <h2>Transform Options</h2>
    <h2>Rotate:</h2>
    <p>Animal:</p>
    <p>
      x <input id="rotateAnimalX" type="number" min="-180" max="180" value="0" step="1" onchange="if (Number.isNaN(parseFloat(this.value))) { this.value = 0; }">
      y <input id="rotateAnimalY" type="number" min="-180" max="180" value="0" step="1" onchange="if (Number.isNaN(parseFloat(this.value))) { this.value = 0; }">
      z <input id="rotateAnimalZ" type="number" min="-180" max="180" value="0" step="1" onchange="if (Number.isNaN(parseFloat(this.value))) { this.value = 0; }">
    </p>

    <p>Head:</p>
      x <input id="rotateHeadX" type="number" min="-90" max="90" value="0" step="1">
      y <input id="rotateHeadY" type="number" min="-90" max="90" value="0" step="1">
      z <input id="rotateHeadZ" type="number" min="-90" max="90" value="0" step="1">
    
    <p>Left Arm:</p>
    <p>
      Upper: <input id="rotateUpperLeftArm" type="range" min="10" max="75" value="10" step="1">
      Lower: <input id="rotateLowerLeftArm" type="range" min="30" max="100" value="30" step="1">
      Wrist (x): <input id="rotateLeftWristX" type="number" min="-90" max="90" value="0" step="1">
      Wrist (y): <input id="rotateLeftWristY" type="number" min="-90" max="90" value="0" step="1">
      Wrist (z): <input id="rotateLeftWristZ" type="number" min="-90" max="90" value="0" step="1">
        <p>Right Arm:</p>
    <p>
      Upper: <input id="rotateUpperRightArm" type="range" min="10" max="75" value="10" step="1">
      Lower: <input id="rotateLowerRightArm" type="range" min="30" max="100" value="30" step="1">
      Wrist (x): <input id="rotateRightWristX" type="number" min="-85" max="85" value="0" step="1">
      Wrist (y): <input id="rotateRightWristY" type="number" min="-85" max="85" value="0" step="1">
      Wrist (z): <input id="rotateRightWristZ" type="number" min="-85" max="85" value="0" step="1">
    
    <script src="../lib/cuon-matrix-cse160.js"></script>
    <script src="../lib/cuon-utils.js"></script>
    <script src="../lib/webgl-utils.js"></script>
    <script src="../lib/webgl-debug.js"></script>
    <link rel="stylesheet" href="assets/asgn2.css">
    <!-- <script src="./shapes/triangle.js"></script>
    <script src="./shapes/square.js"></script>
    <script src="./shapes/circle.js"></script> -->
    <script src="./shapes/cube.js"></script>
    <script src="koala.js"></script>
    <script src="asgn2.js"></script>
  </body>
</html>
