<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" name="color-scheme" content="light dark"/>
    <title>Assignment 3: Blocky World</title>
  </head>

  <body onload="main()">
    <div id="container">
      <canvas id="webgl">
        Please use a browser that supports "canvas"
      </canvas>

      <div id="crosshair"></div>
      
      <div id="settingsPanel">
        <h3>Settings</h3>

        <div id="settingRow">
          <label for="camSpeed">Camera Speed:</label>
          <input id="camSpeed" type="number" value="2">
        </div>

        <div id ="settingRow" style="margin-top: 10px;">
          <label for="targetSize">Target Size:</label>
          <input id="targetSize" type="number" value="0.1" step="0.01">
        </div>

        <div id ="settingRow" style="margin-top: 10px;">
          <label for="maxTargets">Number of Targets:</label>
          <input id="maxTargets" type="number" value="7" step="1">
        </div>
        

        <div id="settingsRow" style="margin-top: 10px;">
          <button id="makeHitBoxVisible">Toggle Hit Box</button>
        </div>

        <div id="settingsRow" style="margin-top: 10px;">
          <button id="resetHeightButton">Reset Height</button>
        </div>
        
        <p id="numdot">NN</p>
      </div>
    </div>
    
    <script src="../lib/cuon-matrix-cse160.js"></script>
    <script src="../lib/cuon-utils.js"></script>
    <script src="../lib/webgl-utils.js"></script>
    <script src="../lib/webgl-debug.js"></script>
    <link rel="stylesheet" href="assets/asgn3.css">
    <script src="shaders.js"></script>
    <script src="header.js"></script>
    <script src="./objects/cube.js"></script>
    <script src="./objects/sphere.js"></script>
    <script src="./objects/camera.js"></script>
    <script src="asgn3.js"></script>
    <script src="./objects/world_objects.js"></script>
    <script src="html_inputs.js"></script>
  </body>
</html>
